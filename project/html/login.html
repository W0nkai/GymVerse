
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="../css/account.css">
    <!-- css -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

    <!-- Bootstrap Script -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.4/dist/jquery.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
    <a href="index.html" class="btn btn-outline-light border-0 position-absolute back-home">&lt; Back Home</a>
    <div class="center-box">
        <div class="login-box p-4">

            <div class="card bg-transparent border-0">
                <div class="card-body"></div>

                <h3 class="text-center mb-4 text-white">Login</h3>

                <form id="loginForm" action="success.html" method="get">
                    
                    <div class="input-group mb-3">
                        <span class="input-group-text">Email</span>
                        <input class="form-control" type="email" name="email" placeholder="example@example.com">
                    </div>

                    <div class="input-group mb-3">
                        <span class="input-group-text">Password</span>
                        <input class="form-control" type="password" id="password" name="password">
                    </div>
                    <div id="error" class="text-danger text-center font-weight-bold mb-3"></div>
                    <div class="text-center mt-2">
                        <a href="#" class="forgot-password">Forgot password?</a>
                    </div>
                    <div class="text-center mt-2">
                        <span class="register">Don't have an account? </span>
                        <a href="register.html" class="forgot-password">Register Here</a>
                    </div>

                    <button type="submit" class="btn btn-warning w-100">Login</button>
                </form>
            </div>
        </div>
    </div>
    <script src="../js/login.js"></script>
</body>
